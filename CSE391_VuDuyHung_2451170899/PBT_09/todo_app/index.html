<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light p-4">
    <div class="container bg-white shadow p-4 rounded" style="max-width: 500px;">
        <h2 class="text-center">Todo App</h2>
        <form id="todoForm" class="input-group mb-3">
            <input id="todoInput" type="text" class="form-control" placeholder="Việc cần làm..." required>
            <button class="btn btn-primary" type="submit">Add</button>
        </form>
        <div class="btn-group w-100 mb-3" role="group">
            <button class="btn btn-outline-secondary" data-filter="all">All</button>
            <button class="btn btn-outline-secondary" data-filter="active">Active</button>
            <button class="btn btn-outline-secondary" data-filter="completed">Completed</button>
        </div>
        <ul id="todoList" class="list-group"></ul>
        <div class="mt-3 d-flex justify-content-between">
            <span id="todoCount">0 items left</span>
            <button id="clearCompleted" class="btn btn-sm btn-danger">Clear Completed</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
