<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll Gallery - PBT 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .gallery-item {
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .gallery-item:hover { transform: scale(1.02); }
        .gallery-img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; }
        #loader { text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-5">Infinite Scroll Gallery</h2>
        <div id="galleryContainer" class="row"></div>
        <div id="loader" class="text-primary fw-bold">⏳ Đang tải thêm ảnh...</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
