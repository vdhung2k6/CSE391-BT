<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - PBT 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 radial-gradient mb-4">
                    <div class="card-body p-4 text-center">
                        <h2 class="card-title fw-bold mb-4 text-primary"><i class="bi bi-cloud-sun-fill me-2"></i>Ứng dụng Thời Tiết</h2>
                        <div class="input-group mb-3">
                            <input type="text" id="cityInput" class="form-control form-control-lg" placeholder="Nhập tên thành phố (vd: Hanoi, Tokyo...)" value="Hanoi">
                            <button class="btn btn-primary btn-lg" id="searchBtn" type="button">
                                <i class="bi bi-search me-1"></i> Tìm kiếm
                            </button>
                        </div>
                    </div>
                </div>

                <div id="weatherContainer">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
