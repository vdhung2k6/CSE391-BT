<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations & Transitions - PBT 05</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div class="container">
        <h1>Bài B2: CSS Transitions & Animations</h1>

        <div class="spinner-section">
            <h2>4. Loading Spinner</h2>
            <div class="loading-spinner"></div>
        </div>

        <div class="fade-in-section">
            <h2>5. Fade-in Animation (CSS Only)</h2>
            <div class="fade-in-box">
                Khối nội dung này sẽ hiện ra từ từ từ dưới lên nhờ @keyframes fadeIn.
            </div>
        </div>

        <div class="products-section">
            <h2>1, 2, 3. Card & Button & Image Hover Effects</h2>
            <div class="product-card">
                <div class="image-container">
                    <img src="https://placehold.co/300x200/e0e0e0/666666?text=Product+Image" alt="Sản phẩm Demo" class="product-image">
                </div>
                <div class="product-info">
                    <h3>Sản phẩm Demo</h3>
                    <p class="price">500.000đ</p>
                    <button class="buy-btn">Mua ngay</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
