<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng ký Tài khoản E-Commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        fieldset {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #f9f9f9;
        }

        fieldset:hover {
            border-color: #667eea;
            background: #f5f5ff;
        }

        legend {
            color: #667eea;
            font-weight: bold;
            font-size: 16px;
            padding: 0 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="password"],
        select,
        textarea {
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="date"]:focus,
        input[type="password"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: #f8f8ff;
        }

        input:invalid:not(:placeholder-shown) {
            border-color: #dc3545;
        }

        input:valid:not(:placeholder-shown) {
            border-color: #28a745;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-item,
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .radio-item label,
        .checkbox-item label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
            color: #555;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 35px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 150px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="reset"] {
            background: #f0f0f0;
            color: #333;
            min-width: 150px;
            border: 1px solid #ddd;
        }

        button[type="reset"]:hover {
            background: #e0e0e0;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .radio-group,
            .checkbox-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Đăng ký Tài khoản</h1>
        <p class="subtitle">Vui lòng điền đầy đủ thông tin bên dưới</p>

        <form action="#" method="POST" novalidate>
            <!-- FIELDSET 1: THÔNG TIN CÁ NHÂN -->
            <fieldset>
                <legend>👤 Thông tin cá nhân</legend>

                <div class="form-group">
                    <label for="fullname">Họ và Tên <span style="color: red;">*</span></label>
                    <input 
                        type="text" 
                        id="fullname" 
                        name="fullname"
                        required 
                        minlength="2" 
                        maxlength="50"
                        placeholder="Ví dụ: Nguyễn Văn A"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email <span style="color: red;">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        required
                        placeholder="Ví dụ: email@example.com"
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại <span style="color: red;">*</span></label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone"
                        pattern="[0-9]{10}" 
                        placeholder="0901234567"
                        title="Vui lòng nhập 10 chữ số"
                    >
                </div>

                <div class="form-group">
                    <label for="dob">Ngày sinh <span style="color: red;">*</span></label>
                    <input 
                        type="date" 
                        id="dob" 
                        name="dob"
                        max="2026-05-20"
                        placeholder="Chọn ngày sinh"
                    >
                </div>
            </fieldset>

            <!-- FIELDSET 2: TÀI KHOẢN -->
            <fieldset>
                <legend>🔐 Tài khoản</legend>

                <div class="form-group">
                    <label for="username">Username <span style="color: red;">*</span></label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username"
                        required
                        pattern="[a-zA-Z0-9_]{3,20}" 
                        placeholder="3-20 ký tự (chữ, số, _)"
                        title="Chỉ chấp nhận chữ cái, số và dấu gạch dưới (_), 3-20 ký tự"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu <span style="color: red;">*</span></label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        required
                        minlength="8"
                        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}"
                        placeholder="Ít nhất 8 ký tự (chữ hoa, thường, số)"
                        title="Ít nhất 8 ký tự, phải chứa 1 chữ hoa, 1 chữ thường, 1 số"
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">Xác nhận mật khẩu <span style="color: red;">*</span></label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm-password"
                        required
                        minlength="8"
                        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}"
                        placeholder="Nhập lại mật khẩu"
                        title="Ít nhất 8 ký tự, phải chứa 1 chữ hoa, 1 chữ thường, 1 số"
                    >
                </div>
                <p style="font-size: 12px; color: #999; margin-top: 5px;">
                    <strong>Lưu ý:</strong> HTML5 không thể validate confirm password, cần dùng JavaScript để kiểm tra!
                </p>
            </fieldset>

            <!-- FIELDSET 3: THÔNG TIN GIAO HÀNG -->
            <fieldset>
                <legend>📍 Thông tin giao hàng</legend>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">Tỉnh/Thành phố <span style="color: red;">*</span></label>
                        <select id="city" name="city" required>
                            <option value="">-- Chọn tỉnh/thành phố --</option>
                            <option value="hanoi">Hà Nội</option>
                            <option value="hcm">Thành phố Hồ Chí Minh</option>
                            <option value="danang">Đà Nẵng</option>
                            <option value="haiphong">Hải Phòng</option>
                            <option value="cantho">Cần Thơ</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="district">Quận/Huyện <span style="color: red;">*</span></label>
                        <select id="district" name="district" required>
                            <option value="">-- Chọn quận/huyện --</option>
                            <option value="district1">Quận 1</option>
                            <option value="district2">Quận 2</option>
                            <option value="district3">Quận 3</option>
                            <option value="district4">Quận 4</option>
                            <option value="district5">Quận 5</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Địa chỉ chi tiết <span style="color: red;">*</span></label>
                    <textarea 
                        id="address" 
                        name="address"
                        rows="3"
                        placeholder="Ví dụ: 123 Đường ABC, Phường XYZ"
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label>Giới tính <span style="color: red;">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="male" name="gender" value="male" required>
                            <label for="male">Nam</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">Nữ</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="other" name="gender" value="other">
                            <label for="other">Khác</label>
                        </div>
                    </div>
                </div>
            </fieldset>

            <!-- CHECKBOX ĐIỀU KHOẢN -->
            <div class="form-group" style="margin-bottom: 20px;">
                <div class="checkbox-item">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms"
                        required
                    >
                    <label for="terms">
                        Tôi đồng ý với <strong style="color: #667eea;">Điều khoản dịch vụ</strong> và 
                        <strong style="color: #667eea;">Chính sách bảo mật</strong> <span style="color: red;">*</span>
                    </label>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="button-group">
                <button type="submit">✅ Đăng ký</button>
                <button type="reset">🔄 Làm lại</button>
            </div>
        </form>
    </div>
</body>
</html>
